<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Undo-Redo</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="input">
            <input type="text" placeholder="Enter your Text" id="task" autocomplete="off">
            <button class="add" onclick="handleAddClick()">Add</button>
        </div>
        <p id="wrong" style="display: none;"></p>
        <div class="buttons">
            <button id="undo" onclick="handleUndoClick()">Undo</button>
            <button id="redo" onclick="handleRedoClick()">Redo</button>
        </div>
        <div class="allSelected">
            <label><input type="checkbox" name="allSelect" id="allSelect" class="sepSelector" onchange="handleSelectAllChange(event)">       Select All</label>
            <button class="deletebtn" style="display: none;" id="deleteSelected" onclick="handleDeleteSelectedClick()">Delete</button>
        </div>
        <p id="emptyState" class="empty-state">No tasks found</p>
        <div id="list"></div>
    </div>
    <script src="script.js"></script>
</body>

</html>
